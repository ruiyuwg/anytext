name: Update Registry Docs

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 6am UTC
  workflow_dispatch:
    inputs:
      library:
        description: 'Specific library to update (leave empty for all)'
        required: false
        type: string

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @repo/scraper run build

      - name: Run scraper
        working-directory: packages/scraper
        run: |
          if [ -n "${{ inputs.library }}" ]; then
            node dist/index.js --library "${{ inputs.library }}"
          else
            node dist/index.js
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet registry/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'docs: update registry docs'
          title: 'docs: update registry docs'
          body: |
            Automated update of registry documentation.

            Updated by the `update-docs` workflow.
          branch: automated/update-docs
          delete-branch: true
